<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tomari — Menu</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 12px; background: #0f172a; color: #f8fafc; }
      .card { background: rgba(15,23,42,0.96); border-radius: 12px; padding: 12px; width: 320px; box-shadow: 0 8px 24px rgba(2,6,23,0.6); }
      .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px }
      .title { font-weight:700; font-size:14px }
      .muted { color:#cbd5e1; font-size:13px }
      .button { background:#3b82f6; color:white; border:none; border-radius:10px; padding:8px 10px; cursor:pointer }
      .secondary { background:rgba(255,255,255,0.06); color:#e2e8f0 }
      .status { padding:6px 8px; border-radius:8px; font-size:13px }
      .on { background:rgba(34,197,94,0.15); color:#bbf7d0 }
      .off { background:rgba(248,113,113,0.12); color:#fecaca }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <div>
          <div class="title">Tomari</div>
          <div class="muted">Manga Tracker</div>
        </div>
        <div id="pausedStatus" class="status off">Paused</div>
      </div>

      <div id="pageInfo" class="muted">Checking current tab…</div>

      <div style="margin-top:10px" class="row">
        <button id="togglePause" class="button">Pause tracking</button>
        <button id="actionButton" class="secondary button">...</button>
      </div>
    </div>

    <script src="/popup.js"></script>
  </body>
</html>
